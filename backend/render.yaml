services:
  - type: web
    name: tanker-manager-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/public/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: tanker-manager-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: tanker-manager-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: tanker-manager-db
          property: password
      - key: SMS_ENABLED
        value: "false"
      - key: CORS_ORIGINS
        value: "*"

databases:
  - name: tanker-manager-db
    plan: free
    databaseName: tankermanager
    user: tankermanager
