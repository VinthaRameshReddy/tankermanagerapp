# Prefer the root render.yaml. This file is kept in sync for reference
# when the service rootDir is backend.
services:
  - type: web
    name: tanker-manager-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/public/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_HOST
        sync: false
      - key: DATABASE_HOST_SUFFIX
        value: singapore-postgres.render.com
      - key: DATABASE_PORT
        value: "5432"
      - key: DATABASE_NAME
        sync: false
      - key: DATABASE_USER
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: APP_PUBLIC_BASE_URL
        value: https://tanker-manager-api-4nvy.onrender.com
      - key: MAPS_PROVIDER
        value: openrouteservice
      - key: ORS_API_KEY
        sync: false
      - key: FAST2SMS_ENABLED
        value: "true"
      - key: FAST2SMS_API_KEY
        sync: false
      - key: FAST2SMS_SENDER_ID
        value: TANKER
      - key: SMS_PROVIDER
        value: fast2sms
      - key: CORS_ORIGINS
        value: "*"
