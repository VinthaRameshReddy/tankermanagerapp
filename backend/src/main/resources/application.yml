server:
  port: ${PORT:8080}

spring:
  application:
    name: tanker-manager
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

app:
  jwt:
    secret: ${JWT_SECRET:Tank3rM4nagerSecr3tKeyMustBeAtLeast256BitsLongForHS256Algorithm!!}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  public-base-url: ${APP_PUBLIC_BASE_URL:}
  sms:
    # Accepts same names as openplot: FAST2SMS_* (or SMS_*)
    enabled: ${SMS_ENABLED:${FAST2SMS_ENABLED:false}}
    provider: ${SMS_PROVIDER:fast2sms}
    api-key: ${SMS_API_KEY:${FAST2SMS_API_KEY:}}
    sender-id: ${SMS_SENDER_ID:${FAST2SMS_SENDER_ID:TANKER}}
  maps:
    provider: ${MAPS_PROVIDER:openrouteservice}
    api-key: ${ORS_API_KEY:}
    ors-base-url: ${ORS_BASE_URL:https://api.openrouteservice.org}
  cors:
    allowed-origins: ${CORS_ORIGINS:*}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.tankermanager: INFO
    org.springframework.security: WARN

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:tankermanager;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true

---
spring:
  config:
    activate:
      on-profile: prod
  # Datasource is fully configured in ProdDataSourceConfig from env vars
  # (DATABASE_HOST / DATABASE_URL). Do not force placeholder URL here.
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
