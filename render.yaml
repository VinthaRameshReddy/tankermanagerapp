# Root Render Blueprint — Web API + Postgres
# In Render: New → Blueprint → connect VinthaRameshReddy/tankermanagerapp

services:
  - type: web
    name: tanker-manager-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/public/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: tanker-manager-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: tanker-manager-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: tanker-manager-db
          property: password
      # Public API URL after deploy, e.g. https://tanker-manager-api.onrender.com
      - key: APP_PUBLIC_BASE_URL
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      # India SMS: use fast2sms (recommended) or msg91
      - key: SMS_ENABLED
        value: "false"
      - key: SMS_PROVIDER
        value: fast2sms
      - key: SMS_API_KEY
        sync: false
      - key: SMS_SENDER_ID
        value: TANKER
      - key: CORS_ORIGINS
        value: "*"

databases:
  - name: tanker-manager-db
    plan: free
    databaseName: tankermanager
    user: tankermanager
