# Blueprint: web service only (reuse existing free Postgres — buffalo_db)
# Render free tier allows only ONE free database.

services:
  - type: web
    name: tanker-manager-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/public/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      # Paste full External Database URL from Render DB → Connect.
      # Do not also set DATABASE_USER/PASSWORD unless URL has no credentials.
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_HOST_SUFFIX
        value: singapore-postgres.render.com
      - key: APP_PUBLIC_BASE_URL
        sync: false
      - key: MAPS_PROVIDER
        value: openrouteservice
      - key: ORS_API_KEY
        sync: false
      - key: FAST2SMS_ENABLED
        value: "true"
      - key: FAST2SMS_API_KEY
        sync: false
      - key: FAST2SMS_SENDER_ID
        value: TANKER
      - key: SMS_PROVIDER
        value: fast2sms
      - key: CORS_ORIGINS
        value: "*"

# No "databases:" block — uses existing buffalo_db (free-tier limit)
