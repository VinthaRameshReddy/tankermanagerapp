# Blueprint: web service only (reuse existing free Postgres).
# Render free tier allows only ONE free database.

services:
  - type: web
    name: tanker-manager-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/public/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      # REQUIRED: paste External Database URL from Render DB → Connect
      # Example: postgres://USER:PASSWORD@dpg-xxx-a.singapore-postgres.render.com/DBNAME
      - key: DATABASE_URL
        sync: false
      # Fallbacks if DATABASE_URL is empty (set these from the same Connect page)
      - key: DATABASE_HOST
        sync: false
      - key: DATABASE_HOST_SUFFIX
        value: singapore-postgres.render.com
      - key: DATABASE_PORT
        value: "5432"
      - key: DATABASE_NAME
        sync: false
      - key: DATABASE_USER
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: APP_PUBLIC_BASE_URL
        value: https://tanker-manager-api-4nvy.onrender.com
      - key: MAPS_PROVIDER
        value: openrouteservice
      - key: ORS_API_KEY
        sync: false
      - key: FAST2SMS_ENABLED
        value: "true"
      - key: FAST2SMS_API_KEY
        sync: false
      - key: FAST2SMS_SENDER_ID
        value: TANKER
      - key: SMS_PROVIDER
        value: fast2sms
      - key: CORS_ORIGINS
        value: "*"

# No "databases:" block — reuse existing free Postgres
